# Configuration spécifique au package "prometheus" standalone
alertmanager:
  enabled: true
  
  # Configuration native d'Alertmanager
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'slack-notifications'
    receivers:
    - name: 'slack-notifications'
      slack_configs:
      - channel: '#nouveau-canal'
        send_resolved: true
        # On passe directement ton URL Slack ici
        api_url: "https://hooks.slack.com/services/YOUR/SECRET/HERE"
        title: '[{{ .Status | toUpper }}] Alerte Énergétique GreenOps 🌱'
        text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"

# On s'assure que le serveur Prometheus intègre tes règles d'alertes locales
serverFiles:
  alerting_rules.yml:
    groups:
      - name: GreenOpsAlerts
        rules:
        - alert: HighPowerConsumption
          expr: sum(avg_over_time(greenops_simulated_core_power_watts[5m])) > 10
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Consommation électrique élevée détectée sur le cluster"
            description: "La puissance totale consommée dépasse 10 Watts depuis plus de 1 minute (Actuellement {{ $value }}W)."