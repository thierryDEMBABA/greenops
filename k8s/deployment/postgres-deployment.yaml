apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: greenops
spec:
  replicas: 1 # Une seule base de données pour éviter les conflits d'écriture
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        prometheus.io/scrape: "true" # Indique à Prometheus de scraper ce pod
        prometheus.io/path: "/metrics" # Endpoint exposé par Postgres Exporter pour les métriques
        prometheus.io/port: "5432" # Port exposé par Postgres Exporter pour les métriques
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: greenops-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres # C'est ce nom qui est utilisé dans votre ConfigMap !
  namespace: greenops
spec:
  ports:
    - port: 5432
  selector:
    app: postgres