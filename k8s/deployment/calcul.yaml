apiVersion: apps/v1
kind: Deployment
metadata:
  name: calcul-deployment
  namespace: greenops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-calcul
  template:
    metadata:
      labels:
        app: service-calcul
    spec:
      containers:
        - name: service-calcul
          image: dmbth/greenops_service_calcul:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          resources:
            # Crucial pour le futur Horizontal Pod Autoscaler (HPA)
            requests:
              cpu: "100m"     # Équivaut à 0.1 cœur CPU minimum réservé
              memory: "128Mi"
            limits:
              cpu: "300m"     # Ne peut pas dépasser 0.3 cœur CPU
              memory: "256Mi"
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: DB_HOST # Ajout de cette variante
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: POSTGRES_HOST # Ajout de cette variante
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_PORT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: REDIS_PORT
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: GREENOPS_RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: GREENOPS_RABBITMQ_PORT
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: greenops-secrets
                  key: RABBITMQ_DEFAULT_PASS
          livenessProbe:
            httpGet:
              path: /docs
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /docs
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: calcul-service
  namespace: greenops
spec:
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: service-calcul