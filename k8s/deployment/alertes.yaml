apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertes-deployment
  namespace: greenops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-alertes
  template:
    metadata:
      labels:
        app: service-alertes
    spec:
      containers:
        - name: service-alertes
          image: dmbth/greenops_gestion_alerte:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: REDIS_PORT
          livenessProbe:
            httpGet:
              path: /docs
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /docs
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alertes-service
  namespace: greenops
spec:
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: service-alertes