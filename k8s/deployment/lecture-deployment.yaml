apiVersion: apps/v1
kind: Deployment
metadata:
  name: lecture-deployment
  namespace: greenops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-lecture
  template:
    metadata:
      labels:
        app: service-lecture
    spec:
      containers:
        - name: service-lecture
          image: dmbth/greenops_service_lecture:latest # Votre image Docker Hub
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: DB_HOST # Ajout de cette variante
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: POSTGRES_HOST # Ajout de cette variante
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: greenops-secrets
                  key: POSTGRES_PASSWORD
          
          livenessProbe:
            httpGet:
              path: /docs
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /docs
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lecture-service
  namespace: greenops
spec:
  ports:
    - port: 8084
      targetPort: 8084
  selector:
    app: service-lecture