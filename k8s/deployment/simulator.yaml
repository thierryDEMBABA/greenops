apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator-deployment
  namespace: greenops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-simulator
  template:
    metadata:
      labels:
        app: service-simulator
      annotations:
        prometheus.io/scrape: "true" # Indique à Prometheus de scraper ce pod
        prometheus.io/path: "/metrics" # Endpoint exposé par FastAPI pour les métriques
        prometheus.io/port: "8000" # Port exposé par FastAPI pour les métriques
    spec:
      containers:
        - name: service-simulator
          image: dmbth/greenops_simulator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            # Crucial pour le futur Horizontal Pod Autoscaler (HPA)
            requests:
              cpu: "100m"     # Équivaut à 0.1 cœur CPU minimum réservé
              memory: "128Mi"
            limits:
              cpu: "300m"     # Ne peut pas dépasser 0.3 cœur CPU
              memory: "256Mi"
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: DB_HOST # Ajout de cette variante
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: POSTGRES_HOST # Ajout de cette variante
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: DB_PORT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: REDIS_PORT
            - name: RABBITMQ_HOST
              valueFrom:   # Doit correspondre au metadata.name du Service RabbitMQ
                configMapKeyRef:
                  name: greenops-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                configMapKeyRef:
                  name: greenops-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: greenops-secrets
                  key: RABBITMQ_DEFAULT_PASS
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: simulator-service
  namespace: greenops
spec:
  ports:
    - port: 8000
      targetPort: 8000 # Port sur lequel FastAPI écoute à l'intérieur du conteneur
  selector:
    app: service-simulator