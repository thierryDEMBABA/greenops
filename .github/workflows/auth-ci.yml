name: CI - Service Auth

on:
  push:
    branches: [ main ]
    paths:
      - 'service-auth/**' # Déclenchement uniquement si le dossier de l'authentification change

jobs:
  build-and-push-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          # Cherche le fichier requirements.txt propre au dossier service-auth pour mettre les dépendances en cache
          cache-dependency-path: service-auth/requirements.txt

      - name: Installer les outils de vérification et valider la syntaxe
        run: |
          pip install flake8
          if [ -f service-auth/requirements.txt ]; then pip install -r service-auth/requirements.txt; fi
          # Analyse le code pour s'assurer qu'il n'y a pas d'erreur de syntaxe ou de variables cassées avant le build
          flake8 service-auth --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Connexion sécurisée au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurer Docker Buildx (Optimisation du cache de couches)
        uses: docker/setup-buildx-action@v3

      - name: Build et Push de l'image Auth
        uses: docker/build-push-action@v5
        with:
          context: ./service-auth
          file: ./service-auth/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/greenops_auth:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/greenops_auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max