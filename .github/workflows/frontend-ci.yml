name: CI - Frontend Vue.js

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**' # Déclenchement uniquement si le dossier frontend change

jobs:
  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances et compiler (Vérification de syntaxe)
        run: |
          cd frontend
          npm install
          npm run build

      - name: Connexion sécurisée au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurer Docker Buildx (Optimisation du cache)
        uses: docker/setup-buildx-action@v3

      - name: Build et Push de l'image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/greenops_frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/greenops_frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max