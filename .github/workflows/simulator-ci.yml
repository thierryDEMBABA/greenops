name: CI - Service Simulator Python

on:
  push:
    branches: [ main, feature/kubernetes ]
    paths:
      - 'service-simulator/**'

jobs:
  build-and-push-simulator:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: service-simulator/requirements.txt

      - name: Vérifier la syntaxe du code (Linting)
        run: |
          pip install flake8
          # S'assure qu'il n'y a pas d'erreur de syntaxe Python avant de packager
          flake8 service-simulator --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Connexion sécurisée au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et Push de l'image Simulator
        uses: docker/build-push-action@v5
        with:
          context: ./service-simulator
          file: ./service-simulator/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/greenops_simulator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/greenops_simulator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max